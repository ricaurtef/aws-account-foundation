---
# Suppress verbose output in automated environments.
quiet: true

# Allow LOW and MEDIUM severity findings to pass (non-blocking).
# Only HIGH and CRITICAL findings will fail the pipeline.
soft-fail-on:
  - LOW
  - MEDIUM

skip-check:
  ############################
  # IAM
  ############################

  - CKV_AWS_111 # CloudFront invalidation does not support resource-level ARNs.
  - CKV_AWS_356 # CloudFront invalidation does not support resource-level ARNs.

  ############################
  # Identity Center
  ############################

  - CKV_AWS_274 # AdministratorAccess is intentional — sole admin of a personal account.
