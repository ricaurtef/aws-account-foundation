name: Terraform

on:
  pull_request:
    paths:
      - "*.tf"
      - "modules/**"
      - "env/**"
  push:
    branches:
      - main
    paths:
      - "*.tf"
      - "modules/**"
      - "env/**"

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  TF_BACKEND_BUCKET: ricaurtef-terraform-state
  TF_BACKEND_KEY: personal/us-east-1/account-foundation/terraform.tfstate
  TF_BACKEND_REGION: us-east-1
  TF_VAR_FILE: env/web-prod.tfvars

jobs:
  check:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.14"

      - name: Check
        run: make check

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.14"

      - name: Validate
        run: make validate

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Init TFLint
        run: tflint --init --config .config/tflint.hcl

      - name: Lint
        run: make tflint

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Security
        run: make security

  plan:
    name: Plan
    if: github.event_name == 'pull_request'
    needs: [check, validate, tflint, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.14"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="key=$TF_BACKEND_KEY" \
            -backend-config="region=$TF_BACKEND_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Plan
        run: terraform plan -no-color -var-file="$TF_VAR_FILE"

  deploy:
    name: Deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [check, validate, tflint, security]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.14"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Init
        run: |
          terraform init \
            -backend-config="bucket=$TF_BACKEND_BUCKET" \
            -backend-config="key=$TF_BACKEND_KEY" \
            -backend-config="region=$TF_BACKEND_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Plan
        run: terraform plan -var-file="$TF_VAR_FILE" -out=tfplan

      - name: Apply
        run: terraform apply tfplan
